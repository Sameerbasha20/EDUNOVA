services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: edunova
      POSTGRES_USER: edunova_admin
      POSTGRES_PASSWORD: changeme123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

volumes:
  pgdata:
